<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradePilot • News Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .news-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }

        .main-news-flow {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .impact-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-item {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .news-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(139,92,246,0.3);
            transform: translateY(-2px);
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .news-source {
            color: #8b5cf6;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
            margin-bottom: 12px;
            display: block;
            text-decoration: none;
        }

        .news-title:hover {
            color: #c4b5fd;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sentiment-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .sentiment-positive { background: var(--neon-green-dim); color: var(--neon-green); }
        .sentiment-negative { background: var(--neon-red-dim); color: var(--neon-red); }
        .sentiment-neutral { background: rgba(255,255,255,0.08); color: var(--text-muted); }

        .impact-box {
            position: absolute;
            top: 0; right: 0;
            padding: 4px 12px;
            background: #8b5cf6;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom-left-radius: 10px;
        }

        .price-impact {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .sidebar-card {
            padding: 16px;
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .impact-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .impact-list-item:last-child { border-bottom: none; }

        .ticker-circle {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(139,92,246,0.15);
            border: 1px solid rgba(139,92,246,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #c4b5fd;
            flex-shrink: 0;
        }

        .impact-info h4 {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .impact-score {
            font-size: 0.7rem;
            color: var(--neon-green);
        }

        .filter-btn {
            padding: 6px 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
        }

        .filter-btn:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        .filter-btn.active {
            color: #c4b5fd;
            background: rgba(139,92,246,0.15);
            box-shadow: 0 0 15px rgba(139,92,246,0.1);
        }

        .ticker-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-main);
            margin-right: 6px;
            cursor: pointer;
            transition: var(--transition);
        }

        .ticker-badge:hover {
            background: #8b5cf6;
            color: #fff;
            border-color: #8b5cf6;
            transform: translateY(-1px);
        }

        @media (max-width: 1000px) {
            .news-grid { grid-template-columns: 1fr; }
            .impact-sidebar { order: -1; }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="glass-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="glow-icon">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <h1>TradePilot <span class="badge">PRO</span></h1>
            </div>
            <div class="controls">
                <nav class="nav-group">
                    <a href="index.html" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Dashboard
                    </a>
                    <a href="tracker.html" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        AI Tracker
                    </a>
                    <a href="news.html" class="nav-link active">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 8h10M7 12h10M7 16h10"/></svg>
                        News
                    </a>
                    <a href="admin.html" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Admin
                    </a>
                </nav>
            </div>
        </header>

        <main>
            <!-- Hero / Search -->
            <section class="glass-card fade-in" style="padding: 20px 30px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div>
                        <h2 style="font-size: 1.3rem; display: flex; align-items: center; gap: 10px;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 8h10M7 12h10M7 16h10"/></svg>
                            Intelligence
                        </h2>
                    </div>
                    <div class="filter-bar" style="display: flex; gap: 10px; padding: 4px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="bullish">Bullish</button>
                        <button class="filter-btn" data-filter="bearish">Bearish</button>
                        <button class="filter-btn" data-filter="high">High Impact</button>
                    </div>
                </div>
                <div class="search-wrap">
                    <input type="text" id="news-search" class="search-input" placeholder="Search ticker (e.g. TLKM)..." autocomplete="off" style="width: 260px;">
                </div>
            </section>

            <div class="news-grid">
                <!-- Main News Flow -->
                <div class="main-news-flow">
                    <div id="news-container" class="fade-in">
                        <div class="loader" style="margin: 100px auto;"></div>
                    </div>
                </div>

                <!-- Sidebar: Impactful Today -->
                <div class="impact-sidebar">
                    <section class="glass-card sidebar-card fade-in">
                        <h3 class="sidebar-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            Top Impact Today
                        </h3>
                        <div id="impact-today-list">
                            <!-- Items populated via JS -->
                        </div>
                    </section>

                    <section class="glass-card sidebar-card fade-in" style="background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, rgba(0,0,0,0) 100%);">
                        <h3 class="sidebar-title">Sentiment Heat</h3>
                        <div style="padding: 20px; text-align: center;">
                            <div style="font-size: 2.5rem; font-weight: 700;" id="market-heat-score">--</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Overall Market Sentiment (IndoBERT)</div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="news.js"></script>
</body>
</html>
